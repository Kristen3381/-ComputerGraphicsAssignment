<!DOCTYPE html>
<html>
<head>
    <title>Advanced Flight Sim - Realistic Lighting</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="flightCanvas"></canvas>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    let mouseX = 0, mouseY = 0;

    // Create a diverse set of real-life objects
    const objects = Array.from({ length: 60 }, () => ({
        x: (Math.random() - 0.5) * 5000,
        z: Math.random() * 3000, // Using Z for depth
        type: Math.random() > 0.4 ? 'tree' : 'building',
        width: 20 + Math.random() * 40,
        height: 30 + Math.random() * 60
    }));

    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / canvas.width) * 2 - 1;
        mouseY = (e.clientY / canvas.height) * 2 - 1;
    });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawRealisticBuilding(x, y, w, h, scale) {
        const shadowOffset = 15 * scale;
        
        // 1. Draw Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x + shadowOffset, y - shadowOffset);
        ctx.lineTo(x + w + shadowOffset, y - shadowOffset);
        ctx.lineTo(x + w, y);
        ctx.fill();

        // 2. Main Face (Lighter)
        ctx.fillStyle = '#e0e0e0';
        ctx.fillRect(x, y - h, w, h);

        // 3. Side Face (Darker Shading)
        ctx.fillStyle = '#b0b0b0';
        ctx.beginPath();
        ctx.moveTo(x + w, y);
        ctx.lineTo(x + w + 10 * scale, y - 10 * scale);
        ctx.lineTo(x + w + 10 * scale, y - h - 10 * scale);
        ctx.lineTo(x + w, y - h);
        ctx.fill();

        // 4. Roof
        ctx.fillStyle = '#7c2d12'; // Brick red
        ctx.beginPath();
        ctx.moveTo(x, y - h);
        ctx.lineTo(x + w, y - h);
        ctx.lineTo(x + w + 10 * scale, y - h - 10 * scale);
        ctx.lineTo(x + 10 * scale, y - h - 10 * scale);
        ctx.fill();
    }

    function drawRealisticTree(x, y, size, scale) {
        // Shadow
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(x + 10 * scale, y, 20 * scale, 10 * scale, 0, 0, Math.PI * 2);
        ctx.fill();

        // Trunk
        ctx.fillStyle = '#45260a';
        ctx.fillRect(x - (2 * scale), y - (15 * scale), 4 * scale, 15 * scale);

        // Foliage (Gradient for sunlight)
        const leafGrad = ctx.createRadialGradient(x - 5, y - 30 * scale, 0, x, y - 30 * scale, 25 * scale);
        leafGrad.addColorStop(0, '#4ade80'); // Highlight
        leafGrad.addColorStop(1, '#065f46'); // Deep forest green
        ctx.fillStyle = leafGrad;
        ctx.beginPath();
        ctx.arc(x, y - 30 * scale, 25 * scale, 0, Math.PI * 2);
        ctx.fill();
    }

    function render() {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const roll = mouseX * 0.7;
        const pitch = mouseY * 400;

        // --- SKY ---
        const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
        sky.addColorStop(0, '#0c4a6e');
        sky.addColorStop(1, '#7dd3fc');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-roll);
        ctx.translate(0, pitch);

        // --- GROUND ---
        ctx.fillStyle = '#14532d'; // Deep Grass
        ctx.fillRect(-10000, 0, 20000, 10000);

        // Sort objects by Z (depth) so far ones are drawn first (Painter's Algorithm)
        objects.sort((a, b) => a.z - b.z);

        objects.forEach(obj => {
            // Perspective Math
            const perspectiveScale = 400 / (400 + obj.z);
            const xPos = obj.x * perspectiveScale;
            const yPos = obj.z * perspectiveScale;

            if (obj.type === 'building') {
                drawRealisticBuilding(xPos, yPos, obj.width * perspectiveScale, obj.height * perspectiveScale, perspectiveScale);
            } else {
                drawRealisticTree(xPos, yPos, obj.width * perspectiveScale, perspectiveScale);
            }
        });

        // Atmospheric Haze Overlay
        const haze = ctx.createLinearGradient(0, 0, 0, 500);
        haze.addColorStop(0, 'rgba(125, 211, 252, 1)');
        haze.addColorStop(1, 'rgba(125, 211, 252, 0)');
        ctx.fillStyle = haze;
        ctx.fillRect(-5000, 0, 10000, 500);

        ctx.restore();

        // --- HUD ---
        drawHUD(cx, cy);

        requestAnimationFrame(render);
    }

    function drawHUD(cx, cy) {
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, 100, 0, Math.PI * 2);
        ctx.moveTo(cx - 120, cy); ctx.lineTo(cx - 80, cy);
        ctx.moveTo(cx + 80, cy); ctx.lineTo(cx + 120, cy);
        ctx.stroke();
    }

    render();
</script>
</body>
</html>
