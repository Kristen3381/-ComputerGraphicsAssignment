<!DOCTYPE html>
<html>
<head>
    <title>Pro Flight Sim - Laura's Build</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        .stats {
            position: absolute; top: 20px; right: 20px;
            color: #0f0; text-align: right; pointer-events: none;
            text-shadow: 0 0 5px #0f0;
        }
    </style>
</head>
<body>
    <div class="stats" id="ui">
        ALT: 12,400 FT<br>
        SPD: 340 KTS<br>
        HDG: 270°
    </div>
    <canvas id="flightCanvas"></canvas>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    let mouseX = 0, mouseY = 0;

    // Object types: 0 = House, 1 = Tree
    const groundObjects = Array.from({ length: 40 }, () => ({
        x: (Math.random() - 0.5) * 4000,
        y: Math.random() * 2000,
        type: Math.floor(Math.random() * 2),
        color: `hsl(${100 + Math.random() * 40}, 30%, ${20 + Math.random() * 20}%)`
    }));

    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / canvas.width) * 2 - 1;
        mouseY = (e.clientY / canvas.height) * 2 - 1;
    });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawHouse(x, y, size, color) {
        ctx.fillStyle = color;
        ctx.fillRect(x - size/2, y - size, size, size); // Base
        ctx.fillStyle = '#333';
        ctx.beginPath(); // Roof
        ctx.moveTo(x - size/1.8, y - size);
        ctx.lineTo(x + size/1.8, y - size);
        ctx.lineTo(x, y - size * 1.5);
        ctx.fill();
    }

    function drawTree(x, y, size) {
        ctx.fillStyle = '#4a2f1b';
        ctx.fillRect(x - size/10, y - size/2, size/5, size/2); // Trunk
        ctx.fillStyle = '#2d5a27';
        ctx.beginPath();
        ctx.arc(x, y - size, size/1.5, 0, Math.PI * 2); // Leaves
        ctx.fill();
    }

    function draw() {
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const roll = mouseX * 0.6;
        const pitch = mouseY * 450;

        // 1. Sky & Atmospheric Perspective
        const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        skyGrad.addColorStop(0, '#001524');
        skyGrad.addColorStop(0.5, '#1565C0');
        skyGrad.addColorStop(1, '#64B5F6');
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-roll);
        ctx.translate(0, pitch);

        // 2. Ground Plane
        ctx.fillStyle = '#1b3a1b'; 
        ctx.fillRect(-5000, 0, 10000, 5000);

        // 3. Render Real-Life Objects (Houses & Trees)
        groundObjects.forEach(obj => {
            // Distance scaling: objects further from horizon look smaller
            const scale = Math.max(0.1, obj.y / 500); 
            const screenX = obj.x;
            const screenY = obj.y;

            if (obj.type === 0) drawHouse(screenX, screenY, 30 * scale, obj.color);
            else drawTree(screenX, screenY, 40 * scale);
        });

        // 4. Horizon Haze (Makes it look "Real")
        const haze = ctx.createLinearGradient(0, -100, 0, 300);
        haze.addColorStop(0, 'rgba(100, 181, 246, 1)');
        haze.addColorStop(1, 'rgba(100, 181, 246, 0)');
        ctx.fillStyle = haze;
        ctx.fillRect(-5000, -100, 10000, 400);

        ctx.restore();

        // 5. Functional HUD
        drawHUD(cx, cy, roll, pitch);

        requestAnimationFrame(draw);
    }

    function drawHUD(cx, cy, roll, pitch) {
        ctx.strokeStyle = '#0f0';
        ctx.fillStyle = '#0f0';
        ctx.lineWidth = 2;
        ctx.font = '12px Courier New';

        // Roll Indicator (Arc at the top)
        ctx.beginPath();
        ctx.arc(cx, cy, 150, Math.PI + 0.5, Math.PI * 2 - 0.5);
        ctx.stroke();

        // Target Reticle
        ctx.beginPath();
        ctx.moveTo(cx - 20, cy); ctx.lineTo(cx - 5, cy);
        ctx.moveTo(cx + 5, cy); ctx.lineTo(cx + 20, cy);
        ctx.moveTo(cx, cy - 5); ctx.lineTo(cx, cy + 5);
        ctx.stroke();

        // Pitch Data
        ctx.fillText(`PITCH: ${Math.round(pitch/10)}°`, cx + 60, cy - 60);
        ctx.fillText(`ROLL:  ${Math.round(roll * 57.3)}°`, cx + 60, cy - 45);
    }

    draw();
</script>
</body>
</html>
