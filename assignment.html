<!DOCTYPE html>
<html>
<head>
    <title>Advanced Flight Sim - Laura's Build</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; cursor: crosshair; }
        canvas { display: block; }
        .stats {
            position: absolute; top: 20px; right: 20px;
            color: #0f0; text-align: right; pointer-events: none;
            text-shadow: 0 0 5px #0f0; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="stats" id="ui">
        ALT: 12,400 FT<br>
        SPD: 340 KTS<br>
        HDG: 270°
    </div>
    <canvas id="flightCanvas"></canvas>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');
    let mouseX = 0, mouseY = 0;
    let frame = 0;

    // Generate random objects and clouds
    const groundObjects = Array.from({ length: 40 }, () => ({
        x: (Math.random() - 0.5) * 5000,
        z: Math.random() * 3000,
        type: Math.random() > 0.4 ? 'tree' : 'house',
        color: `hsl(${20 + Math.random() * 20}, 30%, ${25 + Math.random() * 15}%)`
    }));

    const clouds = Array.from({ length: 10 }, () => ({
        x: (Math.random() - 0.5) * 4000,
        y: -200 - Math.random() * 500,
        z: Math.random() * 2000,
        size: 150 + Math.random() * 200
    }));

    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / canvas.width) * 2 - 1;
        mouseY = (e.clientY / canvas.height) * 2 - 1;
    });

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function drawCloud(x, y, z, size, pitch, roll) {
        const scale = 500 / (500 + z);
        const screenX = x * scale;
        const screenY = y * scale;
        
        const grad = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, size * scale);
        grad.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
        grad.addColorStop(1, 'rgba(255, 255, 255, 0)');
        
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(screenX, screenY, size * scale, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawAirplaneNose(cx, cy, roll, pitch) {
        // Simulating the plane "reacting" to the pilot's input
        // The nose shifts slightly opposite to the movement
        const recoilX = roll * 20; 
        const recoilY = (pitch / 400) * 30;
        const vibration = Math.sin(frame * 0.5) * 1.5; // Engine shake

        const noseW = 450;
        const metalGrad = ctx.createLinearGradient(cx - noseW/2 + recoilX, 0, cx + noseW/2 + recoilX, 0);
        metalGrad.addColorStop(0, '#1c2833');
        metalGrad.addColorStop(0.5, '#7f8c8d');
        metalGrad.addColorStop(1, '#1c2833');

        ctx.save();
        ctx.translate(recoilX, recoilY + vibration);

        // Exterior Nose
        ctx.fillStyle = metalGrad;
        ctx.beginPath();
        ctx.moveTo(cx - noseW/2, canvas.height);
        ctx.quadraticCurveTo(cx, cy + 180, cx + noseW/2, canvas.height);
        ctx.fill();

        // Interior Dash
        ctx.fillStyle = '#0a0a0a';
        ctx.beginPath();
        ctx.moveTo(-100, canvas.height);
        ctx.lineTo(-100, canvas.height - 120);
        ctx.quadraticCurveTo(cx, canvas.height - 160, canvas.width + 100, canvas.height - 120);
        ctx.lineTo(canvas.width + 100, canvas.height);
        ctx.fill();
        
        ctx.restore();
    }

    function draw() {
        frame++;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        const roll = mouseX * 0.6;
        const pitch = mouseY * 400;

        // 1. Sky
        const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
        sky.addColorStop(0, '#001a33');
        sky.addColorStop(1, '#5dade2');
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. World Objects (Moving)
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(-roll);
        ctx.translate(0, pitch);

        // Ground
        ctx.fillStyle = '#145a32'; 
        ctx.fillRect(-10000, 0, 20000, 10000);

        // Render Clouds and Ground Objects
        groundObjects.sort((a, b) => b.z - a.z);
        groundObjects.forEach(obj => {
            const scale = 500 / (500 + obj.z);
            if (obj.type === 'house') {
                ctx.fillStyle = obj.color;
                ctx.fillRect(obj.x * scale - (20 * scale), obj.z * scale - (40 * scale), 40 * scale, 40 * scale);
            } else {
                ctx.fillStyle = '#1e8449';
                ctx.beginPath();
                ctx.arc(obj.x * scale, obj.z * scale - (30 * scale), 25 * scale, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        clouds.forEach(c => drawCloud(c.x, c.y, c.z, c.size, pitch, roll));

        ctx.restore();

        // 3. Airplane Cockpit (Reacting)
        drawAirplaneNose(cx, cy, roll, pitch);

        // 4. HUD
        ctx.strokeStyle = '#0f0';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(cx, cy, 10, 0, Math.PI*2);
        ctx.stroke();

        requestAnimationFrame(draw);
    }

    draw();
</script>
</body>
</html>
