<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Chase View - Pilot Simulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, sans-serif; cursor: crosshair; }
    canvas { display: block; }
    #hud {
      position: absolute; top: 20px; left: 20px;
      color: #00ff00; pointer-events: none;
      text-shadow: 1px 1px 2px #000; font-size: 16px; font-weight: bold;
    }
  </style>
</head>
<body>

  <div id="hud">
    FLIGHT SYSTEM: ACTIVE<br>
    <span id="pR">PITCH: +0.0°</span><br>
    <span id="rR">ROLL:  +0.0°</span>
  </div>

  <canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let width, height;
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

/* --- 1. SETTINGS --- */
const FOV = 700;           // Controls the "lens" depth
const MAX_PITCH = 0.5;     // Limit how much we can look up/down
const MAX_ROLL = 0.8;      // Limit how much we can tilt
let mouseX = width / 2, mouseY = height / 2;

window.addEventListener('mousemove', e => { 
  mouseX = e.clientX; 
  mouseY = e.clientY; 
});

/* --- 2. 3D CALCULATION MATH --- */
// These functions move points around an axis to simulate tilting
function rotateX(p, angle) {
  const cos = Math.cos(angle), sin = Math.sin(angle);
  return { x: p.x, y: p.y * cos - p.z * sin, z: p.y * sin + p.z * cos };
}

function rotateZ(p, angle) {
  const cos = Math.cos(angle), sin = Math.sin(angle);
  return { x: p.x * cos - p.y * sin, y: p.x * sin + p.z * cos, z: p.z };
}

// Converts 3D (x,y,z) coordinates to 2D (x,y) screen pixels
function project(p) {
  const scale = FOV / (p.z + 1000); 
  return {
    x: width / 2 + p.x * scale,
    y: height / 2 + p.y * scale,
    scale: scale
  };
}

/* --- 3. THE WORLD OBJECTS --- */
// Randomly placed clouds
const clouds = Array.from({length: 15}, () => ({
  x: Math.random() * 6000 - 3000,
  y: Math.random() * -1200 - 400,
  z: Math.random() * 5000,
  size: Math.random() * 250 + 150
}));

// "Images" on the ground (represented as textured patches/fields)
const groundPatches = Array.from({length: 40}, () => ({
  x: Math.random() * 8000 - 4000,
  z: Math.random() * 8000,
  w: Math.random() * 400 + 200,
  h: Math.random() * 400 + 200,
  color: `rgb(20, ${Math.random()*50 + 80}, 20)` // different shades of green
}));

/* --- 4. THE AIRPLANE MODEL --- */
// We use arrays of points to define the "Shell" of each part
const planeModel = {
  // The main tube of the plane
  body: [ {x:0, y:0, z:80}, {x:25, y:20, z:0}, {x:0, y:15, z:-180}, {x:-25, y:20, z:0} ],
  // Large flat triangles for wings
  wingL: [ {x:0, y:0, z:20}, {x:-200, y:10, z:-40}, {x:-200, y:10, z:-80}, {x:0, y:0, z:-40} ],
  wingR: [ {x:0, y:0, z:20}, {x:200, y:10, z:-40}, {x:200, y:10, z:-80}, {x:0, y:0, z:-40} ],
  // Tail fins
  tailV: [ {x:0, y:0, z:-140}, {x:0, y:-70, z:-180}, {x:0, y:0, z:-170} ],
  tailH: [ {x:-70, y:0, z:-170}, {x:70, y:0, z:-170}, {x:0, y:0, z:-140} ]
};

// Helper function to draw the 3D parts
function drawShape(points, color, pitch, roll, offsetZ) {
  const projected = points.map(p => {
    let r = rotateZ(p, roll);    // Apply banking (left/right)
    r = rotateX(r, pitch);       // Apply nose up/down
    r.z += offsetZ;              // Move it in front of the camera
    return project(r);
  });

  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(projected[0].x, projected[0].y);
  for(let i=1; i<projected.length; i++) ctx.lineTo(projected[i].x, projected[i].y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = "rgba(0,0,0,0.3)"; // Add slight outlines for depth
  ctx.stroke();
}

/* --- 5. THE ANIMATION LOOP --- */
function draw() {
  // Calculate movement based on mouse
  const targetRoll = ((mouseX / width) - 0.5) * 2 * MAX_ROLL;
  const targetPitch = ((mouseY / height) - 0.5) * 2 * MAX_PITCH;

  // Draw Sky (Gradient)
  const sky = ctx.createLinearGradient(0, 0, 0, height);
  sky.addColorStop(0, "#1a75ff");
  sky.addColorStop(1, "#80b3ff");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, width, height);

  // Draw Ground & Ground Features
  const horizon = height / 2 + (targetPitch * 300);
  ctx.fillStyle = "#1e5d2f"; // Dark base grass
  ctx.fillRect(0, horizon, width, height);

  // Draw Ground Patches (Fields)
  groundPatches.forEach(g => {
    g.z -= 15; if(g.z < -500) g.z = 7500; // Loop them back to the horizon
    const p = project({x: g.x, y: 800 + (targetPitch * 1000), z: g.z});
    ctx.fillStyle = g.color;
    ctx.fillRect(p.x, p.y, g.w * p.scale, g.h * p.scale);
  });

  // Draw Clouds (Semi-transparent)
  ctx.fillStyle = "rgba(255,255,255,0.7)";
  clouds.forEach(c => {
    c.z -= 10; if(c.z < -500) c.z = 4500;
    const p = project({x: c.x, y: c.y + (targetPitch * 800), z: c.z});
    ctx.beginPath();
    ctx.arc(p.x, p.y, c.size * p.scale, 0, Math.PI * 2);
    ctx.fill();
  });

  // Draw the Airplane (Colored and Large)
  const planeZ = 150; // Camera distance from plane
  drawShape(planeModel.wingL, "#ffcc00", targetPitch, targetRoll, planeZ); // Yellow Wings
  drawShape(planeModel.wingR, "#ffcc00", targetPitch, targetRoll, planeZ);
  drawShape(planeModel.tailH, "#e6b800", targetPitch, targetRoll, planeZ);
  drawShape(planeModel.tailV, "#ffdd33", targetPitch, targetRoll, planeZ);
  drawShape(planeModel.body,  "#ffffff", targetPitch, targetRoll, planeZ); // White Body

  // Update HUD
  document.getElementById('pR').textContent = 'PITCH: ' + (-targetPitch * 180 / Math.PI).toFixed(1) + '°';
  document.getElementById('rR').textContent = 'ROLL:  ' + (targetRoll * 180 / Math.PI).toFixed(1) + '°';

  requestAnimationFrame(draw);
}

draw();
/* 
  1. PRIMITIVES: 
     - Paths/Polygons = Airplane Shell (Wings/Body)
     - Arcs = Clouds
     - Rectangles = Terrain/Sky
  2. EVENT LISTENERS:
     - mousemove: Captures pilot input to calculate Pitch/Roll.
     - resize: Keeps the simulation responsive to any screen size.
  3. 3D LOGIC:
     - Rotation: Spins the 3D points in virtual space.
     - Projection: Scales points to 2D pixels to create depth (Chase Cam).
*/
</script>
</body>
</html>
