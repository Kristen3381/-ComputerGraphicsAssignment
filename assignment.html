<!DOCTYPE html>
<html>
<head>
    <title>Airplane Pilot View - Cloudy Sky</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        .hud-text {
            position: absolute; top: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.3);
            padding: 10px; border-radius: 5px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="hud-text">
        <b>FLIGHT SYSTEM ACTIVE</b><br>
        Pitch/Roll: Mouse Movement
    </div>
    <canvas id="flightCanvas"></canvas>

<script>
    const canvas = document.getElementById('flightCanvas');
    const ctx = canvas.getContext('2d');

    let mouseX = 0, mouseY = 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    window.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX / canvas.width) * 2 - 1;
        mouseY = (e.clientY / canvas.height) * 2 - 1;
    });
    resize();

    // Cloud Object Logic
    class Cloud {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = (Math.random() - 0.5) * canvas.width * 3;
            this.y = (Math.random() - 0.5) * canvas.height * 2;
            this.width = 150 + Math.random() * 200;
            this.opacity = 0.3 + Math.random() * 0.5;
        }
        draw(ctx) {
            ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
            ctx.beginPath();
            // Create a "fluffy" shape using multiple overlapping circles
            ctx.arc(this.x, this.y, this.width/3, 0, Math.PI * 2);
            ctx.arc(this.x + 40, this.y - 20, this.width/3.5, 0, Math.PI * 2);
            ctx.arc(this.x + 80, this.y, this.width/3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    const clouds = Array.from({ length: 15 }, () => new Cloud());

    function draw() {
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const pitchOffset = mouseY * 300;
        const rollAngle = mouseX * (Math.PI / 4);

        // 1. Draw the Sky Background (Static)
        const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
        skyGrad.addColorStop(0, '#1a73e8'); // Deep blue top
        skyGrad.addColorStop(1, '#8ab4f8'); // Light blue horizon
        ctx.fillStyle = skyGrad;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Apply Transformations for World Objects (Clouds & Horizon)
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(-rollAngle);
        ctx.translate(0, pitchOffset);

        // Draw Ground/Sea
        ctx.fillStyle = '#0d47a1';
        ctx.fillRect(-canvas.width * 2, 0, canvas.width * 4, canvas.height * 2);

        // Draw Clouds
        clouds.forEach(cloud => cloud.draw(ctx));
        
        ctx.restore();

        // 3. Draw Static HUD (Heads-Up Display)
        drawHUD(centerX, centerY);

        requestAnimationFrame(draw);
    }

    function drawHUD(cx, cy) {
        ctx.strokeStyle = 'rgba(0, 255, 0, 0.6)';
        ctx.lineWidth = 2;
        // Central Aim
        ctx.beginPath();
        ctx.moveTo(cx - 30, cy); ctx.lineTo(cx - 10, cy);
        ctx.moveTo(cx + 10, cy); ctx.lineTo(cx + 30, cy);
        ctx.moveTo(cx, cy - 10); ctx.lineTo(cx, cy + 10);
        ctx.stroke();
        
        // Pitch Ladders (decorative)
        for(let i = -2; i <= 2; i++) {
            if(i === 0) continue;
            let yPos = cy + (i * 60);
            ctx.beginPath();
            ctx.moveTo(cx - 50, yPos); ctx.lineTo(cx - 30, yPos);
            ctx.moveTo(cx + 30, yPos); ctx.lineTo(cx + 50, yPos);
            ctx.stroke();
        }
    }

    draw();
</script>
</body>
</html>
